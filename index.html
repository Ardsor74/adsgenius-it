<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdsGenius Italia - Copywriter AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">
    <h1 class="text-4xl font-bold mb-8 text-blue-400">AdsGenius Italia</h1>
    
    <div class="w-full max-w-2xl bg-slate-800 p-6 rounded-xl shadow-2xl">
        <label class="block mb-2 text-lg">Cosa vuoi vendere oggi?</label>
        <textarea id="productInput" class="w-full p-4 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-blue-500 h-32" placeholder="Es: Crema solare bio per bambini..."></textarea>
        
        <button onclick="generateAds()" id="btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
            ⚡ Genera Magia
        </button>
        
        <div id="loading" class="hidden mt-4 text-center animate-pulse text-blue-300">L'IA sta scrivendo per te...</div>
        <div id="error" class="hidden mt-4 p-4 bg-red-900/50 border border-red-500 rounded text-red-200"></div>
    </div>

    <div id="results" class="w-full max-w-2xl mt-8 space-y-6"></div>

    <script>
        async function generateAds() {
            const product = document.getElementById('productInput').value;
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const errorDiv = document.getElementById('error');

            if (!product) return alert("Inserisci un prodotto!");

            btn.disabled = true;
            loading.classList.remove('hidden');
            results.innerHTML = '';
            errorDiv.classList.add('hidden');

            try {
                // INDIRIZZO CORRETTO PER NETLIFY
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Errore del server');

                results.innerHTML = `<div class="bg-slate-800 p-6 rounded-xl border border-blue-500/30 shadow-lg">
                    <pre class="whitespace-pre-wrap font-sans text-slate-200">${data.text}</pre>
                </div>`;
            } catch (err) {
                errorDiv.innerText = "Errore: " + err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
