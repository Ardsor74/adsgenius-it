[build]
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' https://*; script-src 'self' 'unsafe-inline' https://*; style-src 'self' 'unsafe-inline' https://*; font-src https://*; connect-src 'self' /.netlify/functions/ https://*;"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
